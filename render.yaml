services:
  - type: web
    name: crobic-api
    env: node
    plan: starter
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: crobic-postgres
          property: connectionString
      - key: CLIENT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: BUNNY_STORAGE_ZONE
        sync: false
      - key: BUNNY_STORAGE_ACCESS_KEY
        sync: false
      - key: BUNNY_STORAGE_REGION
        sync: false
      - key: BUNNY_CDN_BASE_URL
        sync: false
      - key: BUNNY_TOKEN_AUTH_KEY
        sync: false
      - key: DAILY_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: ONESIGNAL_APP_ID
        sync: false
      - key: ONESIGNAL_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

databases:
  - name: crobic-postgres
    plan: starter
